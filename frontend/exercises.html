<!DOCTYPE html>
<html>
<head>
  <title>Exercise Search - FitConnect</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <div class="logo">FitConnect</div>
  <ul>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="ai.html">AI Routine</a></li>
    <li><a href="routines.html">My Routines</a></li>
    <li><a href="progress.html">Progress</a></li>
    <li><a href="users.html">Find Users</a></li>
    <li><a href="exercises.html">Exercises</a></li>
  </ul>
</nav>

<section class="hero">
  <h1>Exercise Search</h1>
  <p>Search exercises by name, muscle group, or difficulty level.</p>
</section>

<div class="auth-container">
  <div class="auth-box">
    <h2>Search Exercises</h2>

    <div class="form-group">
      <label>Search</label>
      <input type="text" id="searchInput" placeholder="Example: chest, legs, beginner">
    </div>

    <button class="btn" onclick="searchExercises()">Search</button>

    <div id="results" style="margin-top: 25px;"></div>
  </div>
</div>

<script>
const user = localStorage.getItem("loggedInUser");

if (!user) {
  window.location.href = "login.html";
}

async function searchExercises() {
  const query = document.getElementById("searchInput").value.trim();

  const response = await fetch(
    `http://10.0.0.20:3000/api/exercises/search?q=${encodeURIComponent(query)}`
  );

  const data = await response.json();

  if (!response.ok) {
    alert(data.message);
    return;
  }

  let html = "<h3>Search Results</h3>";

  if (data.length === 0) {
    html += "<p>No exercises found.</p>";
  }

  data.forEach(exercise => {
    html += `
      <div class="feature-card">
        <h3>${exercise.name}</h3>
        <p><strong>Muscle:</strong> ${exercise.muscle}</p>
        <p><strong>Difficulty:</strong> ${exercise.difficulty}</p>
        <p>${exercise.instructions}</p>
      </div>
    `;
  });

  document.getElementById("results").innerHTML = html;
}
</script>

</body>
</html>

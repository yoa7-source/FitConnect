<!DOCTYPE html>
<html>
<head>
  <title>FitConnect AI Routine Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <div class="logo">FitConnect</div>
  <ul>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="ai.html">AI Routine</a></li>
    <li><a href="routines.html">My Routines</a></li>
    <li><a href="progress.html">Progress</a></li>
    <li><a href="users.html">Find Users</a></li>
  </ul>
</nav>

<div class="auth-container">
  <div class="auth-box">
    <h2>AI Workout Routine Assistant</h2>
    <p>Generate a suggested workout routine based on your goal.</p>

    <div class="form-group">
      <label>Goal</label>
      <select id="goal">
        <option value="muscle gain">Muscle Gain</option>
        <option value="fat loss">Fat Loss</option>
        <option value="endurance">Endurance</option>
        <option value="general fitness">General Fitness</option>
      </select>
    </div>

    <div class="form-group">
      <label>Fitness Level</label>
      <select id="level">
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="advanced">Advanced</option>
      </select>
    </div>

    <div class="form-group">
      <label>Days Per Week</label>
      <select id="days">
        <option value="3">3 Days</option>
        <option value="4">4 Days</option>
        <option value="5">5 Days</option>
      </select>
    </div>

    <button class="btn" onclick="generateRoutine()">Generate Routine</button>

    <div id="result" style="margin-top: 25px;"></div>
  </div>
</div>

<script>
const user = localStorage.getItem("loggedInUser");

if (!user) {
  window.location.href = "login.html";
}

async function generateRoutine() {
  const goal = document.getElementById("goal").value;
  const level = document.getElementById("level").value;
  const days = document.getElementById("days").value;

  const response = await fetch("http://10.0.0.20:3000/api/ai-routine", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ goal, level, days })
  });

  const data = await response.json();

  if (!response.ok) {
    alert(data.message);
    return;
  }

  let html = "<h3>Your Suggested Routine</h3><ul>";

  data.routine.forEach(item => {
    html += `<li>${item}</li>`;
  });

  html += "</ul>";

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>

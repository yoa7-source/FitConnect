<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitConnect - Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav>
    <div class="logo">FitConnect</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>

  <div class="auth-container">
    <div class="auth-box">
      <h2>Welcome Back</h2>
      <p>Log in to access your workouts and community.</p>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@email.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button class="btn">Login</button>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

    <script>
        document.querySelector('.btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Basic validation
            if (!email || !password) {
                alert('Please fill in all fields');
                return;
            }

            try {
                const response = await fetch('http://10.0.0.20:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // STORE SESSION: Save the name or token so other pages know who is logged in
                    localStorage.setItem("loggedInUser", data.name);
                    localStorage.setItem("loggedInEmail", email);
                    
                    alert('Login successful. Welcome ' + data.name);
                    // Redirect to a dashboard or home page
                    window.location.href = "dashboard.html"; 
                } else {
                    alert(data.message || 'Invalid login credentials');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Could not connect to the server. Check if your API is running.');
            }
        });
    </script>
</body>
</html>
